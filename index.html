<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admin Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fe;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#111827;
    color:#fff;
    padding:25px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:40px;
}

.logo i{
    font-size:30px;
    color:#4f46e5;
}

.menu{
    list-style:none;
}

.menu li{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.menu li:hover,
.menu .active{
    background:#4f46e5;
}

.menu li i{
    width:25px;
}

/* Main */

.main{
    flex:1;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    color:#1e293b;
    font-size:30px;
}
/* Top Bar */

.top-bar{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:30px;
margin-bottom:30px;

}

.search-box{

width:350px;
background:#fff;
padding:12px 20px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.search-box input{

border:none;
outline:none;
width:100%;
font-size:15px;

}

.top-icons{

display:flex;
align-items:center;
justify-content: flex-end;
gap:15px;

}

.top-icons i{

font-size:22px;
cursor:pointer;

}

.profile{
display: flex;
align-items: center;
top: 100px;

}

.profile img{

width:45px;
height:45px;
border-radius:50%;

}

.profile h4{

margin: 0;

}

.profile p{

font-size:12px;
margin: ;

}
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:24px;
}

.blue .card-icon{
    background:#4f46e5;
}

.green .card-icon{
    background:#22c55e;
}

.orange .card-icon{
    background:#f59e0b;
}

.purple .card-icon{
    background:#8b5cf6;
}

.card-content h2{
    margin:5px 0;
}

.card-content p{
    color:#777;
    font-size:13px;
}

#darkMode{

width:45px;
height:45px;
border:none;
border-radius:50%;
background:#4f46e5;
color:#fff;
font-size:18px;
cursor:pointer;

}

    </style>
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-chart-line"></i>
            <h2>Admin</h2>
        </div>

        <ul class="menu">

            <li class="active">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                <span>Users</span>
            </li>

            <li>
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Orders</span>
            </li>

            <li>
                <i class="fa-solid fa-chart-column"></i>
                <span>Analytics</span>
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </li>

            <li>
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main">

        <header class="header">

            <h1>Dashboard</h1>

        </header>
        <!-- Top Header -->

<div class="top-bar">

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text" placeholder="Search here...">

    </div>

    <div class="top-icons">

        <button id="darkMode">
            <i class="fa-solid fa-moon"></i>
        </button>

        <i class="fa-regular fa-bell"></i>

        <div class="profile">

            <img src="https://i.pravatar.cc/100?img=5" alt="">

            <div>

                <h4>John Doe</h4>

                <p>Administrator</p>

            </div>

        </div>
        

    </div>

</div>
<div class="cards">

    <div class="card blue">
        <div class="card-icon">
            <i class="fa-solid fa-users"></i>
        </div>

        <div class="card-content">
            <h4>Total Users</h4>
            <h2>12,560</h2>
            <p>+15% This Month</p>
        </div>
    </div>

    <div class="card green">
        <div class="card-icon">
            <i class="fa-solid fa-dollar-sign"></i>
        </div>

        <div class="card-content">
            <h4>Revenue</h4>
            <h2>$25,400</h2>
            <p>+10% This Month</p>
        </div>
    </div>

    <div class="card orange">
        <div class="card-icon">
            <i class="fa-solid fa-cart-shopping"></i>
        </div>

        <div class="card-content">
            <h4>Orders</h4>
            <h2>1,240</h2>
            <p>+8% This Month</p>
        </div>
    </div>

    <div class="card purple">
        <div class="card-icon">
            <i class="fa-solid fa-chart-line"></i>
        </div>

        <div class="card-content">
            <h4>Growth</h4>
            <h2>18%</h2>
            <p>Excellent</p>
        </div>
    </div>

</div>

    </main>

</div>

<script src="script.js">
    const darkBtn = document.getElementById("darkMode");

darkBtn.onclick = function(){

document.body.classList.toggle("dark");

}
</script>

</body>
</html>
